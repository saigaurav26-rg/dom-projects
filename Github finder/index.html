<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Finder</title>
  <link rel="stylesheet" href="style.css">
  <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>

  <div class="container">
    <div class="card">
        <i class="ri-sun-fill" id="toggle"></i>
      <h1>GitHub Finder</h1>

      <div class="search-box">
        <input type="text" placeholder="Enter GitHub username..." class="usernameinp">
        <button class="search">Search</button>
      </div>

      <!-- Profile Result -->
      <div class="profile">
        <div class="info"></div>
      </div>

    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
